########################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hyprland.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
# 未知のモニター用フォールバック (自動認識・自動配置)
monitor=,preferred,auto,1

# モニター設定 (monitor_mode.sh で切替)
source = ~/.config/hypr/monitors.conf




###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = foot
$fileManager = dolphin
$menu = rofi -show run
$lock = hyprlock


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = systemctl --user start keyboard-setup.service
exec-once = sleep 1 && setxkbmap -layout jp
exec-once = fcitx5
exec-once = waybar & hyprpaper & dunst

# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
exec-once = ~/.config/hypr/scripts/monitor_watch.sh
exec-once = ~/.config/hypr/scripts/memory_watch.sh


## KDEconnect:
exec-once = /usr/lib/kdeconnectd&!
exec-once = /usr/bin/indicator-kdeconnect&!


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XKB_DEFAULT_LAYOUT,jp
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# fcitx5 (Japanese Input Method)
env = GTK_IM_MODULE,fcitx
env = QT_IM_MODULE,fcitx
env = XMODIFIERS,@im=fcitx


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 5

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(aef359ee) rgba(466d1dee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrulev2 = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrulev2 = rounding 0, floating:0, onworkspace:w[tv1]
# windowrulev2 = bordersize 0, floating:0, onworkspace:f[1]
# windowrulev2 = rounding 0, floating:0, onworkspace:f[1]
# windowrule=pseudo,fcitx

# workspace = 1DP-2,8 # monitor(type-c)をworkspace8に割り当てる
# workspace = 1, monitor:DP-2, default:true
# workspace = 5, monitor:HDMI-A-1, default:true

# ワークスペース設定 (monitor_mode.sh で切替)
source = ~/.config/hypr/workspaces.conf



# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = -0.5 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
# gestures {
#     workspace_swipe = false
# }

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = ALT # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, $terminal
# bind = $mainMod, RETURN, exec, env -u WAYLAND_DISPLAY wezterm
bind = $mainMod SHIFT, RETURN, exec, firefox
bind = $mainMod SHIFT, Q, killactive,
# bind = $mainMod SHIFT, Q, exec, hyprctl dispatch killactive
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod SHIFT, S, exec, screenshot
bind = $mainMod SHIFT, S, exec, 
bind = $mainMod SHIFT, P, exec, hyprpicker
bind = $mainMod, L, exec, $lock
bind = $mainMod SHIFT, T, exec, ~/.config/hypr/scripts/toggle_workspaces.sh

##########################################################################
# モード切り替え: Alt+w で workspace 選択モードに入る
bind = $mainMod, W, submap, workspace_mode

# サブマップ: workspace_mode
submap = workspace_mode

# workspace 選択バインディング（数字キー）
bind = , 1, exec, hyprctl dispatch workspace 1; hyprctl dispatch submap reset
bind = , 2, exec, hyprctl dispatch workspace 2; hyprctl dispatch submap reset
bind = , 3, exec, hyprctl dispatch workspace 3; hyprctl dispatch submap reset
bind = , 4, exec, hyprctl dispatch workspace 4; hyprctl dispatch submap reset
bind = , 5, exec, hyprctl dispatch workspace 5; hyprctl dispatch submap reset
bind = , 6, exec, hyprctl dispatch workspace 6; hyprctl dispatch submap reset
bind = , 7, exec, hyprctl dispatch workspace 7; hyprctl dispatch submap reset
bind = , 8, exec, hyprctl dispatch workspace 8; hyprctl dispatch submap reset
bind = , 9, exec, hyprctl dispatch workspace 9; hyprctl dispatch submap reset
bind = , 0, exec, hyprctl dispatch workspace 10; hyprctl dispatch submap reset

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = SHIFT, 1, exec, hyprctl dispatch movetoworkspace 1; hyprctl dispatch submap reset
bind = SHIFT, 2, exec, hyprctl dispatch movetoworkspace 2;  hyprctl dispatch submap reset
bind = SHIFT, 3, exec, hyprctl dispatch movetoworkspace 3;  hyprctl dispatch submap reset
bind = SHIFT, 4, exec, hyprctl dispatch movetoworkspace 4;  hyprctl dispatch submap reset
bind = SHIFT, 5, exec, hyprctl dispatch movetoworkspace 5;  hyprctl dispatch submap reset
bind = SHIFT, 6, exec, hyprctl dispatch movetoworkspace 6;  hyprctl dispatch submap reset
bind = SHIFT, 7, exec, hyprctl dispatch movetoworkspace 7;  hyprctl dispatch submap reset
bind = SHIFT, 8, exec, hyprctl dispatch movetoworkspace 8;  hyprctl dispatch submap reset
bind = SHIFT, 9, exec, hyprctl dispatch movetoworkspace 9;  hyprctl dispatch submap reset
bind = SHIFT, 0, exec, hyprctl dispatch movetoworkspace 10; hyprctl dispatch submap reset

# fullscreen
bind = , F, exec, hyprctl dispatch fullscreen 0; hyprctl dispatch submap reset

bind = , H, exec, hyprctl dispatch movefocus l; hyprctl dispatch submap reset
bind = , L, exec, hyprctl dispatch movefocus r; hyprctl dispatch submap reset
bind = , J, exec, hyprctl dispatch movefocus d; hyprctl dispatch submap reset
bind = , K, exec, hyprctl dispatch movefocus u; hyprctl dispatch submap reset

bind = , S, exec, hyprctl dispatch workspace name:shell; hyprctl dispatch submap reset
bind = , T, exec, hyprctl dispatch workspace name:term; hyprctl dispatch submap reset
bind = , W, exec, hyprctl dispatch workspace name:web; hyprctl dispatch submap reset
bind = , B, exec, hyprctl dispatch workspace name:BG; hyprctl dispatch submap reset
bind = , A, exec, hyprctl dispatch workspace name:AI; hyprctl dispatch submap reset
bind = , C, exec, hyprctl dispatch workspace name:chat; hyprctl dispatch submap reset
bind = , V, exec, hyprctl dispatch workspace name:vscode; hyprctl dispatch submap reset
bind = , G, exec, hyprctl dispatch workspace name:kaggle; hyprctl dispatch submap reset


bind = SHIFT, H, exec, hyprctl dispatch movewindow l; hyprctl dispatch submap reset
bind = SHIFT, L, exec, hyprctl dispatch movewindow r; hyprctl dispatch submap reset
bind = SHIFT, J, exec, hyprctl dispatch movewindow d; hyprctl dispatch submap reset
bind = SHIFT, K, exec, hyprctl dispatch movewindow u; hyprctl dispatch submap reset

bind = SHIFT, S, exec, hyprctl dispatch movetoworkspace name:shell; hyprctl dispatch submap reset
bind = SHIFT, T, exec, hyprctl dispatch movetoworkspace name:term; hyprctl dispatch submap reset
bind = SHIFT, W, exec, hyprctl dispatch movetoworkspace name:web; hyprctl dispatch submap reset
bind = SHIFT, B, exec, hyprctl dispatch movetoworkspace name:BG; hyprctl dispatch submap reset
bind = SHIFT, A, exec, hyprctl dispatch movetoworkspace name:AI; hyprctl dispatch submap reset
bind = SHIFT, C, exec, hyprctl dispatch movetoworkspace name:chat; hyprctl dispatch submap reset
bind = SHIFT, V, exec, hyprctl dispatch movetoworkspace name:vscode; hyprctl dispatch submap reset
bind = SHIFT, G, exec, hyprctl dispatch movetoworkspace name:kaggle; hyprctl dispatch submap reset


# モニターモード切替サブマップへ遷移
bind = , M, submap, monitor_mode

# # エスケープキーなどでモードを抜ける
bind = , escape, submap, reset
bind = , escape, submap, reset

# モード終了
submap = reset

##########################################################################
# モニターモード切替サブマップ (Alt+W → M → 1/2/3)
submap = monitor_mode
bind = , 1, exec, ~/.config/hypr/scripts/monitor_mode.sh 1; hyprctl dispatch submap reset
bind = , 2, exec, ~/.config/hypr/scripts/monitor_mode.sh 2; hyprctl dispatch submap reset
bind = , 3, exec, ~/.config/hypr/scripts/monitor_mode.sh 3; hyprctl dispatch submap reset
bind = , S, exec, ~/.config/hypr/scripts/monitor_mode.sh status; hyprctl dispatch submap reset
bind = , escape, submap, reset
submap = reset
##########################################################################


bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, pseudo, k dwindle
bind = $mainMod SHIFT, J, togglesplit, # dwindle


# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move window
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d



# # Example special workspace (scratchpad)
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# close and lock
bindl=,switch:off:Lid Switch, exec, $lock # Lock lid on close

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule v1
# windowrule = float, ^(kitty)$

# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

# Fix some dragging issues with XWayland
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# Line
windowrule {
    name = line-launcher-nofocus
    match:class = LineLauncher
    no_focus = true
}



xwayland {
    force_zero_scaling = true
}
exec-once = systemctl --user start hyprpolkitd
